<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lungGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DA6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E5BA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vesselGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Trachea -->
  <path d="M 100 20 L 95 50 M 100 20 L 105 50" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left Lung -->
  <ellipse cx="70" cy="120" rx="35" ry="70" fill="url(#lungGrad)" opacity="0.9"/>
  
  <!-- Right Lung -->
  <ellipse cx="130" cy="120" rx="35" ry="70" fill="url(#lungGrad)" opacity="0.95"/>
  
  <!-- Heart outline -->
  <circle cx="100" cy="90" r="15" fill="#FFB6C1" opacity="0.7" stroke="#FF69B4" stroke-width="1.5"/>
  
  <!-- Pulmonary Arteries -->
  <path d="M 85 55 Q 70 75, 65 100" stroke="url(#vesselGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 115 55 Q 130 75, 135 100" stroke="url(#vesselGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Pulmonary Veins -->
  <path d="M 75 150 Q 80 140, 100 130" stroke="#6495ED" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 125 150 Q 120 140, 100 130" stroke="#6495ED" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Left Lung Bronchial Tree -->
  <path d="M 70 60 L 55 100 M 70 60 L 60 120" stroke="#2E7D8F" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 55 100 L 45 115 M 55 100 L 50 130" stroke="#2E7D8F" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Right Lung Bronchial Tree -->
  <path d="M 130 60 L 145 100 M 130 60 L 140 120" stroke="#2E7D8F" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 145 100 L 155 115 M 145 100 L 150 130" stroke="#2E7D8F" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Alveoli representation -->
  <circle cx="50" cy="140" r="3" fill="#4DA6FF" opacity="0.6"/>
  <circle cx="58" cy="150" r="3" fill="#4DA6FF" opacity="0.6"/>
  <circle cx="150" cy="140" r="3" fill="#4DA6FF" opacity="0.6"/>
  <circle cx="142" cy="150" r="3" fill="#4DA6FF" opacity="0.6"/>
</svg>